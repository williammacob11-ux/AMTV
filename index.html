<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MHTV — Music HTML Television</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     MHTV — a fake 24/7 music-video channel.
     Palette:  ink #0a0a0a · hot yellow #ffe400 · shock pink #ff2d95
               cyan #16e0ff · bone #f4f2e9
     Display: Anton (chyron/logo) · Oswald (titles) · DM Mono (data)
     ============================================================ */
  :root{
    --ink:#0a0a0a; --yellow:#ffe400; --pink:#ff2d95; --cyan:#16e0ff; --bone:#f4f2e9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#000;overflow:hidden;color:var(--bone);
    font-family:"Oswald",system-ui,sans-serif;-webkit-font-smoothing:antialiased}

  /* ---------- video, scaled to COVER the whole screen ---------- */
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}
  #player-wrap{position:absolute;inset:0;overflow:hidden}
  #player{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:100vw;height:56.25vw;min-height:100vh;min-width:177.78vh;pointer-events:none}
  #player iframe{width:100%;height:100%;display:block}

  /* Invisible guard: eats all clicks on the video so nobody can skip/pause it. */
  #guard{position:absolute;inset:0;z-index:20;cursor:default}

  /* ---------- channel bug (logo) top-left ---------- */
  #bug{position:absolute;top:clamp(14px,2.2vw,30px);left:clamp(14px,2.2vw,30px);
    z-index:40;display:flex;align-items:center;gap:9px;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));user-select:none;pointer-events:none}
  #bug .mark{font-family:"Anton";font-size:clamp(26px,3.6vw,44px);line-height:.8;
    letter-spacing:-.03em;color:var(--yellow);
    background:var(--ink);padding:.16em .18em .1em;transform:skewX(-6deg);
    box-shadow:4px 4px 0 var(--pink)}
  #bug .mark b{color:var(--ink);background:var(--yellow);padding:0 .06em;margin-left:.04em}
  #bug .sub{font-family:"DM Mono";font-size:clamp(8px,1vw,11px);letter-spacing:.32em;
    text-transform:uppercase;color:var(--bone);opacity:.85;margin-top:2px}
  .liverec{display:inline-flex;align-items:center;gap:5px}
  .liverec::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--pink);
    animation:blink 1.4s steps(2,end) infinite}
  @keyframes blink{50%{opacity:0}}

  /* ---------- broadcast clock top-right ---------- */
  #clock{position:absolute;top:clamp(14px,2.2vw,30px);right:clamp(14px,2.2vw,30px);z-index:40;
    font-family:"DM Mono";font-size:clamp(13px,1.5vw,18px);letter-spacing:.12em;
    color:var(--bone);text-shadow:0 2px 6px rgba(0,0,0,.8);pointer-events:none}
  #clock .cln{animation:blink 1.06s steps(2,end) infinite}

  /* ---------- the SIGNATURE: MTV-style lower-third chyron ---------- */
  #chyron{position:absolute;left:clamp(16px,3vw,46px);bottom:clamp(30px,7vh,74px);z-index:45;
    max-width:min(560px,80vw);pointer-events:none;
    transform:translateX(-118%);opacity:0;transition:transform .55s cubic-bezier(.2,.9,.25,1),opacity .3s}
  #chyron.show{transform:translateX(0);opacity:1}
  #chyron .artist{font-family:"Anton";font-size:clamp(26px,4.4vw,54px);line-height:.9;
    color:var(--ink);background:var(--yellow);display:inline-block;
    padding:.1em .34em .04em;transform:skewX(-6deg);text-transform:uppercase;
    box-shadow:5px 5px 0 rgba(0,0,0,.55)}
  #chyron .artist span{display:inline-block;transform:skewX(6deg)}
  #chyron .song{font-family:"Oswald";font-weight:700;font-size:clamp(16px,2.4vw,28px);
    color:var(--bone);background:var(--ink);display:inline-block;margin-top:8px;
    padding:.22em .5em;letter-spacing:.01em;box-shadow:5px 5px 0 rgba(0,0,0,.45)}
  #chyron .meta{font-family:"DM Mono";font-size:clamp(10px,1.2vw,13px);letter-spacing:.18em;
    text-transform:uppercase;margin-top:9px;color:var(--ink);background:var(--cyan);
    display:inline-block;padding:.35em .7em;transform:skewX(-6deg)}
  #chyron .meta span{display:inline-block;transform:skewX(6deg)}
  #chyron .bar{height:5px;width:clamp(120px,26vw,240px);margin-top:11px;
    background:linear-gradient(90deg,var(--pink),var(--yellow),var(--cyan))}

  /* ---------- tuning static (canvas) shown between tracks ---------- */
  #static{position:absolute;inset:0;z-index:30;opacity:0;transition:opacity .18s;
    pointer-events:none;background:#000}
  #static.on{opacity:1}
  #tune-label{position:absolute;inset:0;z-index:31;display:none;place-items:center;
    font-family:"DM Mono";letter-spacing:.4em;color:var(--bone);text-transform:uppercase;
    font-size:clamp(12px,1.6vw,16px);text-shadow:0 0 12px rgba(0,0,0,.9);pointer-events:none}
  #tune-label.on{display:grid}
  #tune-label b{animation:blink 1s steps(2,end) infinite;font-weight:500}

  /* ---------- bottom controls: mute + fullscreen (NO skip) ---------- */
  #controls{position:absolute;right:clamp(14px,2.2vw,28px);bottom:clamp(14px,2.2vw,28px);z-index:50;
    display:flex;gap:10px}
  .ctl{width:46px;height:46px;border:2px solid rgba(244,242,233,.5);background:rgba(10,10,10,.55);
    color:var(--bone);border-radius:0;cursor:pointer;display:grid;place-items:center;
    backdrop-filter:blur(3px);transition:transform .1s,border-color .15s,background .15s}
  .ctl:hover{border-color:var(--yellow);background:rgba(10,10,10,.8)}
  .ctl:active{transform:translateY(2px)}
  .ctl:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
  .ctl svg{width:22px;height:22px;fill:currentColor}

  /* ---------- power-on screen ---------- */
  #boot{position:fixed;inset:0;z-index:100;background:#000;display:grid;place-items:center;
    text-align:center;overflow:hidden}
  #bootnoise{position:absolute;inset:0;opacity:.5}
  #boot .panel{position:relative;z-index:2;padding:0 24px}
  #boot .logo{font-family:"Anton";font-size:clamp(56px,13vw,150px);line-height:.82;
    letter-spacing:-.04em;color:var(--yellow);transform:skewX(-6deg);
    text-shadow:7px 7px 0 var(--pink),14px 14px 0 var(--cyan)}
  #boot .logo b{color:var(--ink);background:var(--yellow);padding:0 .05em}
  #boot .tag{font-family:"DM Mono";letter-spacing:.5em;text-transform:uppercase;
    font-size:clamp(9px,1.5vw,13px);color:var(--bone);opacity:.8;margin-top:22px}
  #powerbtn{margin-top:38px;font-family:"Anton";font-size:clamp(18px,2.6vw,26px);
    text-transform:uppercase;letter-spacing:.06em;color:var(--ink);background:var(--yellow);
    border:none;padding:.7em 1.4em .58em;cursor:pointer;transform:skewX(-6deg);
    box-shadow:6px 6px 0 var(--pink);transition:transform .08s,box-shadow .08s}
  #powerbtn span{display:inline-block;transform:skewX(6deg)}
  #powerbtn:hover{box-shadow:9px 9px 0 var(--pink)}
  #powerbtn:active{transform:skewX(-6deg) translate(4px,4px);box-shadow:2px 2px 0 var(--pink)}
  #powerbtn:focus-visible{outline:3px solid var(--cyan);outline-offset:4px}
  #boot .count{font-family:"DM Mono";font-size:12px;letter-spacing:.3em;color:var(--bone);
    opacity:.55;margin-top:26px;text-transform:uppercase}

  @media (max-width:560px){
    #controls .ctl{width:42px;height:42px}
    #chyron{bottom:clamp(70px,12vh,90px)}
  }
  @media (prefers-reduced-motion:reduce){
    #chyron{transition:opacity .3s}
    .liverec::before,#clock .cln,#tune-label b{animation:none}
  }
</style>
</head>
<body>
  <div id="stage" aria-hidden="true">
    <div id="player-wrap"><div id="player"></div></div>
    <canvas id="static"></canvas>
    <div id="tune-label"><div>PLEASE STAND BY&nbsp;<b>…</b></div></div>
    <div id="guard"></div>

    <div id="bug">
      <div>
        <div class="mark">M<b>H</b>TV</div>
        <div class="sub"><span class="liverec">On Air</span> · Music Television</div>
      </div>
    </div>

    <div id="clock" aria-hidden="true">--<span class="cln">:</span>--</div>

    <div id="chyron">
      <div class="artist"><span id="cy-artist">ARTIST</span></div><br>
      <div class="song" id="cy-song">Song Title</div><br>
      <div class="meta"><span id="cy-meta">ALBUM · 0000</span></div>
      <div class="bar"></div>
    </div>

    <div id="controls">
      <button class="ctl" id="mutebtn" title="Mute / unmute" aria-label="Mute or unmute">
        <svg id="mute-ico" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1c2.9.9 5 3.6 5 6.7s-2.1 5.8-5 6.7v2.1c4-1 7-4.6 7-8.8s-3-7.8-7-8.8z"/></svg>
      </button>
      <button class="ctl" id="fsbtn" title="Fullscreen" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 24 24"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg>
      </button>
    </div>
  </div>

  <!-- power-on screen -->
  <div id="boot">
    <canvas id="bootnoise"></canvas>
    <div class="panel">
      <div class="logo">M<b>H</b>TV</div>
      <div class="tag">Music&nbsp;·&nbsp;HTML&nbsp;·&nbsp;Television</div>
      <button id="powerbtn"><span>▶ &nbsp;Turn on the TV</span></button>
      <div class="count" id="loadmsg">30 videos loaded · shuffled · no skipping</div>
    </div>
  </div>

<script>
/* ============================================================
   PLAYLIST
   Each track needs a YouTube video ID (the part after ?v= in a
   youtube.com URL, or after youtu.be/). If a video won't play
   or shows "unavailable", it's a wrong/embed-blocked ID — swap it:
   open the song on YouTube, copy the 11-char ID, paste it below.
   Bad or blocked videos auto-skip to the next track on their own.
   ============================================================ */
const PLAYLIST = [
  {artist:"Michael Jackson", title:"Don't Stop 'Til You Get Enough", album:"Off the Wall", year:1979, id:"yURRmWtbTbo"},
  {artist:"Michael Jackson", title:"Rock with You",                  album:"Off the Wall", year:1979, id:"3Y8VBxlG7ho"},
  {artist:"Michael Jackson", title:"The Girl Is Mine",               album:"Thriller",     year:1982, id:"pAJEZgHfQOc"},
  {artist:"Michael Jackson", title:"Thriller",                       album:"Thriller",     year:1982, id:"sOnqjkJTMaA"},
  {artist:"Michael Jackson", title:"Beat It",                        album:"Thriller",     year:1982, id:"oRdxUFDoQe0"},
  {artist:"Michael Jackson", title:"Billie Jean",                    album:"Thriller",     year:1982, id:"Zi_XLOBDo_Y"},
  {artist:"Michael Jackson", title:"Human Nature",                   album:"Thriller",     year:1982, id:"_2NoxKZgv-g"},
  {artist:"Michael Jackson", title:"P.Y.T. (Pretty Young Thing)",    album:"Thriller",     year:1982, id:"1lyu1KKwC74"},
  {artist:"Michael Jackson", title:"Bad",                            album:"Bad",          year:1987, id:"dsUXAEzaC3Q"},
  {artist:"Michael Jackson", title:"The Way You Make Me Feel",       album:"Bad",          year:1987, id:"HzZ_urpj4As"},
  {artist:"Michael Jackson", title:"Man in the Mirror",              album:"Bad",          year:1987, id:"PivWY9wn5ps"},
  {artist:"Michael Jackson", title:"Dirty Diana",                    album:"Bad",          year:1987, id:"yUi_S6YParE"},
  {artist:"Michael Jackson", title:"Smooth Criminal",               album:"Bad",          year:1987, id:"h_D3VFfhvs4"},
  {artist:"Michael Jackson", title:"In the Closet",                  album:"Dangerous",    year:1991, id:"04CXJICwLGc"},
  {artist:"Michael Jackson", title:"Remember the Time",              album:"Dangerous",    year:1991, id:"LejfEIsjE0g"},
  {artist:"Michael Jackson", title:"Heal the World",                 album:"Dangerous",    year:1991, id:"BWf-eARnf6U"},
  {artist:"Michael Jackson", title:"Black or White",                 album:"Dangerous",    year:1991, id:"F2AitTPI5U0"},
  {artist:"Michael Jackson", title:"You Are Not Alone",              album:"HIStory",      year:1995, id:"nBKCLcs6qhc"},
  {artist:"Michael Jackson", title:"Earth Song",                     album:"HIStory",      year:1995, id:"XAi3VTSdTxU"},
  {artist:"Michael Jackson", title:"Heaven Can Wait",                album:"Invincible",   year:2001, id:"5rL9yz9J6uA"},
  {artist:"Michael Jackson", title:"Chicago",                        album:"Xscape",       year:2014, id:"7Dj1uz2jO1o"},
  {artist:"Phil Collins",    title:"Another Day in Paradise",        album:"...But Seriously", year:1989, id:"Kk-VvySYUw4"},
  {artist:"Def Leppard",     title:"Pour Some Sugar on Me",          album:"Hysteria",     year:1987, id:"0UIB9Y4OW6c"},
  {artist:"MGMT",            title:"Kids",                           album:"Oracular Spectacular", year:2008, id:"vd9v3D6mbrM"},
  {artist:"Daryl Hall & John Oates", title:"You Make My Dreams (Come True)", album:"Voices", year:1980, id:"PBsjBQmAj8g"},
  {artist:"Daryl Hall & John Oates", title:"Maneater",              album:"H2O",          year:1982, id:"Q9UvFHfg_pQ"},
  {artist:"Daryl Hall & John Oates", title:"Rich Girl",             album:"Bigger Than Both of Us", year:1976, id:"eL2sQd2wYP0"},
  {artist:"Shakira ft. Wyclef Jean", title:"Hips Don't Lie",        album:"Oral Fixation, Vol. 2", year:2006, id:"DUT5rEU6pqM"},
  {artist:"Lord Huron",      title:"The Night We Met",               album:"Strange Trails", year:2015, id:"KtlgYxa6BMU"},
  {artist:"The Jackson 5",   title:"I Want You Back",                album:"Diana Ross Presents The Jackson 5", year:1969, id:"s3Q80mk7bxE"},
];

/* ---------- state ---------- */
let player, order = [], ptr = 0, announced = false, chyronTimer = null;

/* Fisher–Yates shuffle of indices */
function shuffle(){
  order = PLAYLIST.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
}
const track = ()=> PLAYLIST[order[ptr]];

/* ---------- YouTube IFrame API ---------- */
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function(){
  shuffle();
  player = new YT.Player('player',{
    videoId: track().id,
    playerVars:{
      autoplay:0, controls:0, disablekb:1, fs:0, rel:0, playsinline:1,
      modestbranding:1, iv_load_policy:3, cc_load_policy:0
    },
    events:{ onReady:()=>{}, onStateChange:onState, onError:onError }
  });
};

function onState(e){
  if(e.data === YT.PlayerState.PLAYING){
    stopTuning();
    if(!announced){ showChyron(); announced = true; }
  } else if(e.data === YT.PlayerState.ENDED){
    next();
  }
}
function onError(){ // wrong ID, private, or embed-blocked → move on
  startTuning();
  setTimeout(next, 1300);
}

/* ---------- transport (advance only; never user-skippable) ---------- */
function next(){
  ptr++;
  if(ptr >= order.length){ shuffle(); ptr = 0; }   // loop forever, reshuffled
  announced = false;
  hideChyron();
  startTuning();
  player.loadVideoById(track().id);
}

function begin(){
  shuffle && null;
  announced = false;
  startTuning();
  player.loadVideoById(track().id);
  player.unMute();
  player.setVolume(100);
  player.playVideo();
}

/* ---------- chyron ---------- */
function showChyron(){
  const t = track();
  document.getElementById('cy-artist').textContent = t.artist.toUpperCase();
  document.getElementById('cy-song').textContent   = t.title;
  document.getElementById('cy-meta').textContent   = t.album + " · " + t.year;
  const el = document.getElementById('chyron');
  el.classList.add('show');
  clearTimeout(chyronTimer);
  chyronTimer = setTimeout(()=> el.classList.remove('show'), 7000);
}
function hideChyron(){ document.getElementById('chyron').classList.remove('show'); }

/* ---------- tuning static ---------- */
const sCanvas = document.getElementById('static');
const sCtx = sCanvas.getContext('2d');
let staticRAF = null;
function sizeStatic(){ sCanvas.width = Math.floor(innerWidth/3); sCanvas.height = Math.floor(innerHeight/3); }
function drawStatic(){
  const w=sCanvas.width,h=sCanvas.height,img=sCtx.createImageData(w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){ const v=Math.random()*255|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  sCtx.putImageData(img,0,0);
  staticRAF = requestAnimationFrame(drawStatic);
}
function startTuning(){
  sCanvas.classList.add('on');
  document.getElementById('tune-label').classList.add('on');
  if(!staticRAF && !matchMedia('(prefers-reduced-motion:reduce)').matches) drawStatic();
}
function stopTuning(){
  sCanvas.classList.remove('on');
  document.getElementById('tune-label').classList.remove('on');
  cancelAnimationFrame(staticRAF); staticRAF = null;
}
sizeStatic(); addEventListener('resize', sizeStatic);

/* ---------- boot noise (power screen) ---------- */
const bCanvas = document.getElementById('bootnoise');
const bCtx = bCanvas.getContext('2d');
function sizeBoot(){ bCanvas.width = Math.floor(innerWidth/3); bCanvas.height = Math.floor(innerHeight/3); }
let bootRAF=null;
function bootDraw(){
  const w=bCanvas.width,h=bCanvas.height,img=bCtx.createImageData(w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){ const v=Math.random()*90|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  bCtx.putImageData(img,0,0);
  bootRAF=requestAnimationFrame(bootDraw);
}
sizeBoot(); addEventListener('resize', sizeBoot);
if(!matchMedia('(prefers-reduced-motion:reduce)').matches) bootDraw();

/* ---------- clock ---------- */
setInterval(()=>{
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0');
  const mm=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML = hh+'<span class="cln">:</span>'+mm;
},1000);

/* ---------- controls ---------- */
document.getElementById('mutebtn').addEventListener('click',()=>{
  if(!player) return;
  const ico=document.getElementById('mute-ico');
  if(player.isMuted()){ player.unMute(); ico.innerHTML='<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1c2.9.9 5 3.6 5 6.7s-2.1 5.8-5 6.7v2.1c4-1 7-4.6 7-8.8s-3-7.8-7-8.8z"/>'; }
  else{ player.mute(); ico.innerHTML='<path d="M3 9v6h4l5 5V4L7 9H3zm18.5-1.9L20.1 5.7 17.8 8 15.5 5.7 14.1 7.1 16.4 9.4 14.1 11.7 15.5 13.1 17.8 10.8 20.1 13.1 21.5 11.7 19.2 9.4z"/>'; }
});
document.getElementById('fsbtn').addEventListener('click',()=>{
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else{ document.exitFullscreen?.(); }
});

/* ---------- power on ---------- */
document.getElementById('powerbtn').addEventListener('click',()=>{
  const boot=document.getElementById('boot');
  boot.style.transition='opacity .35s'; boot.style.opacity='0';
  cancelAnimationFrame(bootRAF); bootRAF=null;
  setTimeout(()=> boot.remove(), 380);
  document.documentElement.requestFullscreen?.().catch(()=>{});
  const wait=setInterval(()=>{ if(player && player.loadVideoById){ clearInterval(wait); begin(); } },120);
});
</script>
</body>
</html>
